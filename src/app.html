<!doctype html>
<html lang="en" class="motion-safe:scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <link rel="apple-touch-icon" sizes="120x120" href="%sveltekit.assets%/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%sveltekit.assets%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%sveltekit.assets%/favicon-16x16.png" />
    <link rel="manifest" href="%sveltekit.assets%/site.webmanifest" />
    <link rel="mask-icon" href="%sveltekit.assets%/safari-pinned-tab.svg" color="#171717" />

    <meta name="msapplication-TileColor" content="#f3f3f3" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="viewport" content="width=device-width" />

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YC66PW0B34"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
      gtag('config', 'G-YC66PW0B34', { send_page_view: false });
    </script>

    <script>
      document.documentElement.setAttribute('data-theme', 'light');
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" data-sveltekit-preload-code="viewport">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
